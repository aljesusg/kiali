name: MCP-Checker Evaluation - PR Results Report

on:
  workflow_run:
    workflows: ["MCP-Checker Evaluation"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  report:
    name: Post Evaluation Results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'issue_comment'
    steps:
    - name: Check if evaluation ran
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        JOB_CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
          --jq '.jobs[] | select(.name == "Run MCP Evaluation") | .conclusion')

        if [[ -n "$JOB_CONCLUSION" && "$JOB_CONCLUSION" != "skipped" ]]; then
          echo "should-report=true" >> $GITHUB_OUTPUT
        else
          echo "should-report=false" >> $GITHUB_OUTPUT
          echo "Evaluation job was skipped, no report needed"
        fi

    - name: Checkout master (baseline eval file)
      if: steps.check.outputs.should-report == 'true'
      uses: actions/checkout@v6
      with:
        ref: master

    - name: Set up Go
      if: steps.check.outputs.should-report == 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Install mcpchecker
      if: steps.check.outputs.should-report == 'true'
      run: |
        export GOPATH="${GOPATH:-$HOME/go}"
        echo "GOPATH=$GOPATH" >> "$GITHUB_ENV"
        make mcp-install-mcpchecker

    - name: Download evaluation context
      if: steps.check.outputs.should-report == 'true'
      uses: actions/download-artifact@v8
      with:
        name: eval-context
        path: eval-context/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download mcpchecker results (PR run)
      id: download_mcp
      if: steps.check.outputs.should-report == 'true'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: mcpchecker-results
        path: pr-eval/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.event.workflow_run.repository.full_name }}

    - name: Post results comment
      if: steps.check.outputs.should-report == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        export GOPATH="${GOPATH:-$HOME/go}"
        MCPCHECKER="${GOPATH}/bin/mcpchecker"

        PR_NUMBER=$(jq -r '.pr_number' eval-context/context.json)
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

        if [[ "${{ steps.download_mcp.outcome }}" != "success" ]]; then
          {
            echo "## mcpchecker evaluation report (skipped)"
            echo ""
            echo "Could not download the \`mcpchecker-results\` artifact from [workflow run](${RUN_URL})."
            echo "Typical causes: the **mcpchecker MCP Evaluation** workflow on the default branch is missing the upload step (merge the latest workflow), the eval job was cancelled before upload, or the artifact expired."
          } > skip-comment.md
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file skip-comment.md
          exit 0
        fi

        # master baseline (committed): tests/evals/mcpchecker-results/
        BASE="${GITHUB_WORKSPACE}/tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json"
        # this PR's CI run output: ./mcpchecker-results/
        CURRENT="${GITHUB_WORKSPACE}/pr-eval/mcpchecker-results/mcpchecker-gemini-eval-out.json"

        if [[ ! -f "${CURRENT}" ]]; then
          echo "Missing PR evaluation output after download: ${CURRENT}" >&2
          exit 1
        fi

        {
          echo "## mcpchecker evaluation (vs \`master\`)"
          echo ""
          if [[ -f "${BASE}" ]] && jq -e 'length > 0' "${BASE}" >/dev/null 2>&1; then
            "${MCPCHECKER}" diff --base "${BASE}" --current "${CURRENT}" --output markdown
          else
            echo "_No committed baseline at \`tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json\` on \`master\` yet._"
            echo ""
            echo "### This run (summary)"
            echo ""
            echo '```text'
            "${MCPCHECKER}" summary "${CURRENT}" --output text
            echo '```'
          fi
          echo ""
          echo "[Workflow run](${RUN_URL})"
        } > comment.md

        gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file comment.md
