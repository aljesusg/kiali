name: mcpchecker MCP Evaluation

on:
  # Manual trigger via PR comments
  issue_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-trigger:
    name: Check if evaluation should run
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/run-mcpchecker'))
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      pr-number: ${{ steps.check.outputs.pr-number }}
      pr-sha: ${{ steps.check.outputs.pr-sha }}
      is-pr: ${{ steps.check.outputs.is-pr }}
    steps:
    - name: Check trigger conditions
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq '.permission')

          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "is-pr=true" >> $GITHUB_OUTPUT
            PR_NUMBER="${{ github.event.issue.number }}"
            echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT

            PR_SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
            echo "pr-sha=$PR_SHA" >> $GITHUB_OUTPUT
            echo "Pinned to SHA: $PR_SHA"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "User ${{ github.event.comment.user.login }} does not have permission to trigger evaluations"
          fi
        else
          echo "should-run=true" >> $GITHUB_OUTPUT
          echo "is-pr=false" >> $GITHUB_OUTPUT
          echo "pr-sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

  run-evaluation:
    name: Run MCP Evaluation
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.base_ref || 'master' }}
      BUILD_BRANCH: ${{ needs.check-trigger.outputs.pr-sha }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.check-trigger.outputs.pr-sha }}

    - name: Set GOPATH for MCP tooling
      run: echo "GOPATH=${GOPATH:-$HOME/go}" >> $GITHUB_ENV

    - name: Install Helm
      uses: Azure/setup-helm@v5.0.0
      with:
        version: "v3.18.4"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Enable corepack
      run: corepack enable

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: yarn
        cache-dependency-path: frontend/yarn.lock

    - name: Build frontend and backend
      run: make build-ui clean build

    - name: Setup Kind cluster, install Istio/Kiali, and start Kiali
      id: setup
      run: hack/run-integration-tests.sh --test-suite backend --mcp-tools true --setup-only true

    - name: Install MCP evaluation tools
      run: make mcp-install-tools

    - name: Start kubernetes-mcp-server
      run: make mcp-start-server

    - name: Run mcpchecker evaluation
      id: mcpchecker
      run: |
        MCP_EVAL_ARGS="${{ github.event.inputs.verbose == 'true' && '-v' || '' }}"
        make mcp-run-eval MCP_EVAL_ARGS="${MCP_EVAL_ARGS}"

        EVAL_JSON="mcpchecker-results/mcpchecker-gemini-eval-out.json"
        if [ -f "${EVAL_JSON}" ]; then
          TASKS_TOTAL=$(jq 'length' "${EVAL_JSON}")
          TASKS_PASSED=$(jq '[.[] | select(.taskPassed == true)] | length' "${EVAL_JSON}")
          ASSERTIONS_TOTAL=$(jq '[.[] | .assertionResults | to_entries | length] | add // 0' "${EVAL_JSON}")
          ASSERTIONS_PASSED=$(jq '[.[] | .assertionResults | to_entries[] | select(.value.passed == true)] | length' "${EVAL_JSON}")

          if [ "$TASKS_TOTAL" -gt 0 ]; then
            TASK_PASS_RATE=$(awk "BEGIN {printf \"%.2f\", $TASKS_PASSED / $TASKS_TOTAL}")
          else
            TASK_PASS_RATE="0"
          fi

          PASSED="false"
          if awk "BEGIN {exit !($TASK_PASS_RATE >= 0.8)}"; then
            PASSED="true"
          fi

          echo "tasks-passed=$TASKS_PASSED" >> $GITHUB_OUTPUT
          echo "tasks-total=$TASKS_TOTAL" >> $GITHUB_OUTPUT
          echo "task-pass-rate=$TASK_PASS_RATE" >> $GITHUB_OUTPUT
          echo "assertions-passed=$ASSERTIONS_PASSED" >> $GITHUB_OUTPUT
          echo "assertions-total=$ASSERTIONS_TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
        fi
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Evaluation summary (step summary)
      if: always() && hashFiles('mcpchecker-results/mcpchecker-gemini-eval-out.json') != ''
      run: make mcp-eval-summary >> $GITHUB_STEP_SUMMARY

    - name: Upload mcpchecker results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mcpchecker-results
        path: mcpchecker-results/mcpchecker-gemini-eval-out.json
        if-no-files-found: warn

    - name: Cleanup
      if: always()
      run: make mcp-stop-server

    - name: Save evaluation context
      if: always() && needs.check-trigger.outputs.is-pr == 'true'
      run: |
        mkdir -p eval-context
        cat > eval-context/context.json << EOF
        {
          "pr_number": "${{ needs.check-trigger.outputs.pr-number }}",
          "pr_sha": "${{ needs.check-trigger.outputs.pr-sha }}",
          "tasks_passed": "${{ steps.mcpchecker.outputs.tasks-passed }}",
          "tasks_total": "${{ steps.mcpchecker.outputs.tasks-total }}",
          "task_pass_rate": "${{ steps.mcpchecker.outputs.task-pass-rate }}",
          "assertions_passed": "${{ steps.mcpchecker.outputs.assertions-passed }}",
          "assertions_total": "${{ steps.mcpchecker.outputs.assertions-total }}",
          "passed": "${{ steps.mcpchecker.outputs.passed }}"
        }
        EOF

    - name: Upload PR context
      if: always() && needs.check-trigger.outputs.is-pr == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: eval-context
        path: eval-context/
        retention-days: 1

  update-baseline:
    name: Update Token Baseline
    needs: [check-trigger, run-evaluation]
    if: |
      always() &&
      needs.run-evaluation.result == 'success' &&
      needs.check-trigger.outputs.is-pr != 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout master
      uses: actions/checkout@v6
      with:
        ref: master

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Install mcpchecker
      run: |
        export GOPATH="${GOPATH:-$HOME/go}"
        echo "GOPATH=$GOPATH" >> "$GITHUB_ENV"
        make mcp-install-mcpchecker

    - name: Download mcpchecker results
      uses: actions/download-artifact@v8
      with:
        name: mcpchecker-results
        path: baseline-download/

    - name: Apply baseline updates and open PR
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        export GOPATH="${GOPATH:-$HOME/go}"
        MCPCHECKER="${GOPATH}/bin/mcpchecker"

        BRANCH="chore/update-mcp-eval-token-baseline"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        SHA="${{ needs.check-trigger.outputs.pr-sha }}"

        OLD_EVAL="$(mktemp)"
        trap 'rm -f "${OLD_EVAL}"' EXIT

        if git cat-file -e "HEAD:tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json" 2>/dev/null; then
          git show "HEAD:tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json" > "${OLD_EVAL}"
        elif git cat-file -e "HEAD:mcpchecker-results/mcpchecker-gemini-eval-out.json" 2>/dev/null; then
          git show "HEAD:mcpchecker-results/mcpchecker-gemini-eval-out.json" > "${OLD_EVAL}"
        else
          echo '[]' > "${OLD_EVAL}"
        fi

        mkdir -p tests/evals/mcpchecker-results
        # Run output is ./mcpchecker-results/; promote into the committed baseline path for master
        cp baseline-download/mcpchecker-results/mcpchecker-gemini-eval-out.json tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json
        NEW_EVAL="${GITHUB_WORKSPACE}/tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json"

        make mcp-update-token-readme

        {
          echo "## MCP evaluation baseline update"
          echo ""
          echo "Commits the latest \`mcpchecker check\` output to \`tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json\` and refreshes the token table in \`ai/mcp/README.md\` (via \`mcpchecker summary\` on that JSON)."
          echo ""
          echo "**Commit:** [\`${SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${SHA}) — [workflow run](${RUN_URL})"
          echo ""
          if jq -e 'length > 0' "${OLD_EVAL}" >/dev/null 2>&1; then
            "${MCPCHECKER}" diff --base "${OLD_EVAL}" --current "${NEW_EVAL}" --output markdown
          else
            echo "_No prior \`tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json\` on \`master\` (first baseline)._"
            echo ""
            echo "### New run (summary)"
            echo ""
            echo '```text'
            "${MCPCHECKER}" summary "${NEW_EVAL}" --output text
            echo '```'
          fi
          echo ""
          echo "---"
          echo "*This PR was automatically generated by the mcpchecker workflow.*"
        } > pr-body.md

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git checkout -B "$BRANCH"
        git add tests/evals/mcpchecker-results/mcpchecker-gemini-eval-out.json ai/mcp/README.md

        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "chore(evals): update MCP evaluation token baseline"
        git push -f origin "$BRANCH"

        EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || echo "")

        if [ -n "$EXISTING_PR" ]; then
          echo "Updating existing PR #$EXISTING_PR"
          gh pr edit "$EXISTING_PR" --body-file pr-body.md
        else
          echo "Creating new PR"
          gh pr create \
            --title "chore: update MCP evaluation token baseline" \
            --body-file pr-body.md \
            --base master \
            --head "$BRANCH"
        fi
