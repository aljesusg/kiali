kind: Agent
metadata:
  name: "gemini-pro"
commands:
  useVirtualHome: false
  argTemplateMcpServer: "{{ .File }}"
  argTemplateAllowedTools: "mcp__{{ .ServerName }}__{{ .ToolName }}"
  allowedToolsJoinSeparator: ","
  runPrompt: |-
    set -euo pipefail

    if ! command -v jq >/dev/null 2>&1; then
      echo "jq is required to extract MCP server details" >&2
      exit 1
    fi

    MCP_SERVER_FILE="{{ .McpServerFileArgs }}"
    if [[ ! -f "${MCP_SERVER_FILE}" ]]; then
      echo "MCP server file not found: ${MCP_SERVER_FILE}" >&2
      exit 1
    fi

    MCP_URL="$(jq -r '.mcpServers.kubernetes.url' "${MCP_SERVER_FILE}")"
    if [[ -z "${MCP_URL}" || "${MCP_URL}" == "null" ]]; then
      echo "Unable to parse kubernetes MCP URL from ${MCP_SERVER_FILE}" >&2
      exit 1
    fi
    DEBUG_DIR="${GEVALS_DEBUG_DIR:-}"
    TMP_HOME="$(mktemp -d)"
    mkdir -p "${TMP_HOME}"
    cd "${TMP_HOME}"

    cleanup() {
      local exit_status="$1"

      if [[ -n "${DEBUG_DIR}" ]]; then
        mkdir -p "${DEBUG_DIR}"
        if [[ -f "${PROMPT_FILE}" ]]; then
          cp "${PROMPT_FILE}" "${DEBUG_DIR}/prompt.txt" 2>/dev/null || true
        fi
        if [[ -d "${TMP_HOME}" ]]; then
          mkdir -p "${DEBUG_DIR}/gemini-home"
          cp -R "${TMP_HOME}/." "${DEBUG_DIR}/gemini-home" 2>/dev/null || true
          if [[ -d "${DEBUG_DIR}/gemini-home/.kube" ]]; then
            rm -rf "${DEBUG_DIR}/gemini-home/.kube"
          fi
        fi
        printf 'exit_status=%s\n' "${exit_status}" >> "${DEBUG_DIR}/debug.log"
      fi

      rm -rf "${TMP_HOME}"
      rm -f "${PROMPT_FILE}"
      gemini mcp remove "$SERVER_NAME" >/dev/null 2>&1 || true

      trap - EXIT
      exit "${exit_status}"
    }
    trap 'cleanup $?' EXIT

    PROMPT_FILE="$(mktemp)"
    printf '%b' {{ printf "%q" .Prompt }} > "${PROMPT_FILE}"
    PROMPT_CONTENT="$(cat "${PROMPT_FILE}")"

    SERVER_NAME="kubernetes"
    gemini mcp add "${SERVER_NAME}" "${MCP_URL}" --scope project --transport http --trust >/dev/null

    # Ensure cleanup on exit (success or failure)
    GEMINI_MODEL="${GEMINI_MODEL:-gemini-2.5-flash-lite}"

    gemini "${PROMPT_CONTENT}" \
          --allowed-mcp-server-names "$SERVER_NAME" \
          --approval-mode yolo \
          --output-format json \
          --model "$GEMINI_MODEL"
